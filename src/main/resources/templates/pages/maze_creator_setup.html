<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/base :: html">

<section th:fragment="content">

  <h2>Create Maze</h2>

  <form id="maze-form">
    File Name:
    <input type="text" id="mazeName" required><br>

    <button type="submit">Create</button>
  </form>

  <script>
    document.getElementById("maze-form").onsubmit = e => {
      e.preventDefault();

      const rows = +document.getElementById("rows").value;
      const cols = +document.getElementById("cols").value;
      const name = document.getElementById("mazeName").value.trim();

      if(rows < 5 || rows > 20 || cols < 5 || cols > 20){
        alert("Size must be 5–20");
        return;
      }

      if(!/^[a-zA-Z0-9_-]+$/.test(name)){
        alert("Invalid filename");
        return;
      }

      sessionStorage.setItem("mazeRows", rows);
      sessionStorage.setItem("mazeCols", cols);
      sessionStorage.setItem("mazeName", name);

      window.location.href="/maze-editor";
    };
  </script>

</section>
</html>
